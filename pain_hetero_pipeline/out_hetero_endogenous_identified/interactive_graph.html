document.getElementById('mg').innerHTML='<div class="mb"><div class="mv">'+MT.auc+'</div><div class="ml">AUC</div></div><div class="mb"><div class="mv">'+MT.f1+'</div><div class="ml">F1</div></div><div class="mb"><div class="mv">'+MT.acc+'</div><div class="ml">Accuracy</div></div><div class="mb"><div class="mv">'+MT.precision+'</div><div class="ml">Precision</div></div><div class="mb"><div class="mv">'+MT.recall+'</div><div class="ml">Recall</div></div><div class="mb"><div class="mv">'+MT.n_correct+'/'+MT.n_samples+'</div><div class="ml">Correct</div></div>';

var lc={'Amino Acid':'#FF6B6B','Lipid':'#FFA94D','Nucleotide':'#51CF66','Cofactors':'#845EF7','Peptide':'#FF922B','Carbohydrate':'#20C997','Energy':'#339AF0','Enzyme':'#4ECDC4','Sub Pathway':'#2D6A4F'};
var lh='';for(var k in lc)lh+='<span class="li" onclick="filterT(\''+k+'\')"><span class="ld" style="background:'+lc[k]+'"></span>'+k+'</span>';
document.getElementById('lg').innerHTML=lh;

function bML(){var ns=GD.nodes.filter(function(n){return n.data.type==='metabolite'}).sort(function(a,b){return a.data.rank-b.data.rank});var h='';ns.forEach(function(n){h+='<div class="ir" onclick="focN(\''+n.data.id+'\')"><span class="ik">'+n.data.rank+'</span><span class="in" title="'+n.data.full_name+'">'+n.data.full_name+'</span><span class="is">'+n.data.importance+'</span></div>'});document.getElementById('ml').innerHTML=h}
function bEL(){var ns=GD.nodes.filter(function(n){return n.data.type==='enzyme'}).sort(function(a,b){return a.data.rank-b.data.rank});var h='';ns.forEach(function(n){h+='<div class="ir" onclick="focN(\''+n.data.id+'\')"><span class="ik">'+n.data.rank+'</span><span class="in" title="'+n.data.full_name+'">'+n.data.full_name+'</span><span class="is">'+n.data.importance+'</span></div>'});document.getElementById('el').innerHTML=h}
function bPL(){var ns=GD.nodes.filter(function(n){return n.data.type==='pathway'}).sort(function(a,b){return parseFloat(b.data.importance)-parseFloat(a.data.importance)});var h='';ns.forEach(function(n,i){h+='<div class="ir" onclick="focN(\''+n.data.id+'\')"><span class="ik">'+(i+1)+'</span><span class="in" title="'+n.data.full_name+'">'+n.data.full_name+'</span><span class="is">'+n.data.n_metabolites+' mets</span></div>'});document.getElementById('pl').innerHTML=h}
function bLL(){var h='';LD.forEach(function(d){var c=d.correct?'#22c55e':'#ef4444';var bc=d.true===1?(d.correct?'#22c55e':'#ef4444'):(d.correct?'#38bdf8':'#f97316');var ic=d.correct?'\u2713':'\u2717';h+='<div class="lr"><span class="ls">'+d.sample+'</span><div class="lbg"><div class="lb" style="width:'+d.pred_prob*100+'%;background:'+bc+'"></div></div><span class="lp">'+d.pred_prob+'</span><span class="lc" style="color:'+c+'">'+ic+'</span></div>'});document.getElementById('ll').innerHTML=h}
bML();bEL();bPL();bLL();

document.querySelectorAll('.t').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.t').forEach(function(x){x.classList.remove('a')});document.querySelectorAll('.tc').forEach(function(x){x.classList.remove('a')});t.classList.add('a');document.getElementById('tab-'+t.dataset.tab).classList.add('a')})});

document.getElementById('sb').addEventListener('input',function(e){var q=e.target.value.toLowerCase();if(!q){resetH();return}cy.elements().addClass('fa').removeClass('hi nb');cy.nodes().forEach(function(node){var l=(node.data('full_name')||node.data('label')||'').toLowerCase();var sp=(node.data('super_pathway')||'').toLowerCase();var sub=(node.data('sub_pathway')||'').toLowerCase();if(l.indexOf(q)>=0||sp.indexOf(q)>=0||sub.indexOf(q)>=0){node.removeClass('fa').addClass('hi');node.connectedEdges().removeClass('fa').addClass('hi');node.neighborhood().nodes().removeClass('fa').addClass('nb')}})});

function focN(id){var n=cy.getElementById(id);if(!n||n.empty())return;resetH();cy.elements().addClass('fa');n.removeClass('fa').addClass('hi');n.connectedEdges().removeClass('fa').addClass('hi');n.neighborhood().nodes().removeClass('fa').addClass('nb');cy.animate({center:{eles:n},zoom:2},{duration:400});showD(n)}

function showD(node){var d=node.data();var p=document.getElementById('dp');var c=document.getElementById('dc');var h='<h3>'+d.full_name+'</h3>';h+='<div class="df"><span class="db" style="background:'+d.color+'">'+d.type+'</span></div>';
if(d.type==='metabolite'){h+='<div class="df"><div class="dl">Importance Rank</div><div class="dv">#'+d.rank+' ('+d.importance+')</div></div>';h+='<div class="df"><div class="dl">Super Pathway</div><div class="dv">'+(d.super_pathway||'N/A')+'</div></div>';h+='<div class="df"><div class="dl">Sub Pathway</div><div class="dv">'+(d.sub_pathway||'N/A')+'</div></div>'}
else if(d.type==='enzyme'){h+='<div class="df"><div class="dl">Importance Rank</div><div class="dv">#'+d.rank+' ('+d.importance+')</div></div>';h+='<div class="df"><div class="dl">Reactions</div><div class="dv" style="font-size:11px">'+(d.reactions||'N/A').replace(/;/g,'<br>')+'</div></div>';h+='<div class="df"><div class="dl">Supporting Metabolites</div><div class="dv">'+(d.supporting_mets||'N/A')+'</div></div>'}
else if(d.type==='pathway'){h+='<div class="df"><div class="dl">Aggregate Importance</div><div class="dv">'+d.importance+'</div></div>';h+='<div class="df"><div class="dl">Super Pathway</div><div class="dv">'+(d.super_pathway||'N/A')+'</div></div>';h+='<div class="df"><div class="dl">Top Metabolites ('+d.n_metabolites+')</div><div class="dv">'+(d.metabolites||'N/A')+'</div></div>'}
var nb=node.neighborhood().nodes();if(nb.length>0){h+='<div class="dn"><div class="dl">Connected ('+nb.length+')</div>';nb.forEach(function(n){var nd=n.data();var ic=nd.type==='metabolite'?'\u25cf':(nd.type==='enzyme'?'\u25a0':'\u25c6');h+='<span class="nl" onclick="focN(\''+nd.id+'\')">'+ic+' '+nd.full_name+'</span>'});h+='</div>'}
c.innerHTML=h;p.style.display='block'}

function closeD(){document.getElementById('dp').style.display='none'}
function resetH(){cy.elements().removeClass('fa hi nb')}
function hiTop(n){resetH();cy.elements().addClass('fa');var ms=cy.nodes('[type="metabolite"]').sort(function(a,b){return a.data('rank')-b.data('rank')});ms.slice(0,n).forEach(function(node){node.removeClass('fa').addClass('hi');node.connectedEdges().removeClass('fa').addClass('hi');node.neighborhood().nodes().removeClass('fa').addClass('nb')})}
function filterT(t){resetH();cy.elements().addClass('fa');var ns;if(t==='Enzyme')ns=cy.nodes('[type="enzyme"]');else if(t==='Sub Pathway')ns=cy.nodes('[type="pathway"]');else ns=cy.nodes().filter(function(n){return(n.data('super_pathway')||'').indexOf(t)>=0});ns.forEach(function(n){n.removeClass('fa').addClass('hi');n.connectedEdges().removeClass('fa').addClass('hi');n.neighborhood().nodes().removeClass('fa').addClass('nb')})}

cy.on('tap','node',function(e){var n=e.target;resetH();cy.elements().addClass('fa');n.removeClass('fa').addClass('hi');n.connectedEdges().removeClass('fa').addClass('hi');n.neighborhood().nodes().removeClass('fa').addClass('nb');showD(n)});
cy.on('tap',function(e){if(e.target===cy){resetH();closeD()}});

var tt=document.getElementById('tt');
cy.on('mouseover','node',function(e){var d=e.target.data();var t='<b>'+d.full_name+'</b><br>Type: '+d.type+'<br>Score: '+d.importance;if(d.super_pathway)t+='<br>Pathway: '+d.super_pathway;tt.innerHTML=t;tt.style.display='block'});
cy.on('mousemove',function(e){tt.style.left=(e.originalEvent.clientX+15)+'px';tt.style.top=(e.originalEvent.clientY+15)+'px'});
cy.on('mouseout','node',function(){tt.style.display='none'});

var li=0;var lns=['cose','circle','concentric','grid'];
function reLayout(){li=(li+1)%lns.length;var o={name:lns[li],animate:true,animationDuration:500};if(lns[li]==='concentric')o.concentric=function(n){return n.data('type')==='pathway'?3:(n.data('type')==='enzyme'?2:1)};cy.layout(o).run()}
</script>
</body>
</html>
